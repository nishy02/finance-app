services:
  - type: web
    name: finance-app
    runtime: node
    rootDir: finance-backend
    buildCommand: npm install
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true   # Render auto-generates a secure random value
      - key: JWT_EXPIRES_IN
        value: 24h
    disk:
      name: sqlite-data
      mountPath: /data
      sizeGB: 1
