services:
  - type: web
    name: finance-app
    runtime: node
    buildCommand: cd finance-backend && npm install
    startCommand: cd finance-backend && npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRES_IN
        value: 24h
