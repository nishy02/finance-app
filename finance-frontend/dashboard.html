<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard — FinanceApp</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .dash-controls {
      display: flex; gap: 8px; align-items: center;
    }
    .dash-controls select {
      width: auto; padding: 6px 12px; font-size: 12.5px;
      background: var(--surface); border: 1px solid var(--border2);
      color: var(--text2); cursor: pointer;
    }
    .dash-controls select:focus { color: var(--text); }

    .legend {
      display: flex; gap: 14px; margin-top: 12px;
      font-size: 11.5px; color: var(--text3);
    }
    .legend-item { display: flex; align-items: center; gap: 5px; }
    .legend-dot {
      width: 8px; height: 8px; border-radius: 2px; display: inline-block;
    }

    .recent-badge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--text3);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 2px 9px;
      font-family: var(--mono);
    }

    .stat-change {
      font-size: 11.5px; font-family: var(--mono);
      margin-top: 4px; color: var(--text3);
    }
  </style>
</head>
<body>
<nav id="nav"></nav>

<div class="page">
  <div class="page-header">
    <div>
      <h1>Dashboard</h1>
      <p style="color:var(--text2);font-size:13px;margin-top:2px">Financial overview at a glance</p>
    </div>
    <div class="dash-controls">
      <select id="trendYear"></select>
      <select id="trendPeriod">
        <option value="monthly">Monthly</option>
        <option value="weekly">Weekly</option>
      </select>
    </div>
  </div>

  <!-- Stats -->
  <div class="stat-grid" id="statGrid">
    <div class="card">
      <div class="card-title">Total Income</div>
      <div class="card-value green" id="statIncome">—</div>
      <div class="stat-change" id="statIncomeCount"></div>
    </div>
    <div class="card">
      <div class="card-title">Total Expenses</div>
      <div class="card-value red" id="statExpenses">—</div>
      <div class="stat-change" id="statExpensesCount"></div>
    </div>
    <div class="card">
      <div class="card-title">Net Balance</div>
      <div class="card-value" id="statNet">—</div>
      <div class="stat-change" id="statNetLabel"></div>
    </div>
    <div class="card">
      <div class="card-title">Total Records</div>
      <div class="card-value" id="statCount" style="color:var(--accent2)">—</div>
      <div class="stat-change">all time</div>
    </div>
  </div>

  <div class="charts-grid">
    <div class="card">
      <div class="section-title">Category Breakdown</div>
      <div id="categoryChart"><div class="text-muted" style="font-size:12px;color:var(--text3)">Loading…</div></div>
    </div>
    <div class="card">
      <div class="section-title">Income vs Expenses</div>
      <div id="trendsChart"><div class="text-muted" style="font-size:12px;color:var(--text3)">Loading…</div></div>
    </div>
  </div>

  <!-- Recent activity -->
  <div class="table-card">
    <div style="display:flex;align-items:center;justify-content:space-between;padding:18px 20px 14px;border-bottom:1px solid var(--border)">
      <div class="section-title" style="margin:0">Recent Activity</div>
      <a href="records.html" style="font-size:12px;color:var(--accent2)">View all →</a>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Date</th><th>Category</th><th>Type</th>
            <th>Amount</th><th>Notes</th><th>By</th>
          </tr>
        </thead>
        <tbody id="recentBody">
          <tr><td colspan="6" style="text-align:center;padding:28px;color:var(--text3)">Loading…</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="app.js"></script>
<script>
  if (!requireAuth('analyst')) throw '';
  renderNav();

  const fmt = n => '$' + Number(n).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });

  const yearSel = document.getElementById('trendYear');
  const curYear = new Date().getFullYear();
  for (let y = curYear; y >= curYear - 4; y--) {
    const o = document.createElement('option');
    o.value = y; o.textContent = y;
    yearSel.appendChild(o);
  }

  async function loadAll() {
    const year   = yearSel.value;
    const period = document.getElementById('trendPeriod').value;

    const [summary, cats, trends, recent] = await Promise.all([
      api('GET', '/dashboard/summary'),
      api('GET', '/dashboard/by-category'),
      api('GET', `/dashboard/trends?period=${period}&year=${year}`),
      api('GET', '/dashboard/recent?limit=10'),
    ]);

    // Stats
    document.getElementById('statIncome').textContent   = fmt(summary.summary.total_income);
    document.getElementById('statExpenses').textContent = fmt(summary.summary.total_expenses);

    const net = summary.summary.net_balance;
    const netEl = document.getElementById('statNet');
    netEl.textContent = fmt(net);
    netEl.className   = 'card-value ' + (net >= 0 ? 'green' : 'red');
    document.getElementById('statNetLabel').textContent = net >= 0 ? '↑ surplus' : '↓ deficit';
    document.getElementById('statNetLabel').style.color = net >= 0 ? 'var(--green)' : 'var(--red)';

    document.getElementById('statCount').textContent = summary.summary.total_records;

    // Category chart
    const catEl = document.getElementById('categoryChart');
    if (!cats.categories.length) {
      catEl.innerHTML = '<div class="empty-state" style="padding:24px"><div class="empty-icon">📊</div><p>No data yet</p></div>';
    } else {
      const maxVal = Math.max(...cats.categories.map(c => c.total));
      catEl.innerHTML = `<div class="chart-bar-wrap">` +
        cats.categories.slice(0, 8).map(c => `
          <div class="chart-bar-row">
            <div class="chart-bar-label" title="${c.category}">${c.category}</div>
            <div class="chart-bar-track">
              <div class="chart-bar-fill" style="width:${(c.total/maxVal*100).toFixed(1)}%;background:${c.type==='income'?'var(--green)':'var(--red)'}"></div>
            </div>
            <div class="chart-bar-val">${fmt(c.total)}</div>
          </div>`).join('') +
        `</div>`;
    }

    // Trends chart
    const trendEl = document.getElementById('trendsChart');
    if (!trends.trends.length) {
      trendEl.innerHTML = '<div class="empty-state" style="padding:24px"><div class="empty-icon">📈</div><p>No data for this period</p></div>';
    } else {
      const byPeriod = {};
      trends.trends.forEach(t => {
        if (!byPeriod[t.period]) byPeriod[t.period] = { income: 0, expense: 0 };
        byPeriod[t.period][t.type] = t.total;
      });
      const maxT = Math.max(...Object.values(byPeriod).flatMap(v => [v.income, v.expense]));
      const label = p => period === 'monthly' ? p.slice(5) : p.split('-W')[1] ? 'W'+p.split('-W')[1] : p;

      trendEl.innerHTML = `<div class="trend-grid">` +
        Object.entries(byPeriod).map(([p, v]) => `
          <div class="trend-row">
            <div class="trend-label">${label(p)}</div>
            <div class="trend-track">
              <div class="trend-seg" style="width:${(v.income/maxT*100).toFixed(1)}%;background:var(--green)" title="Income: ${fmt(v.income)}"></div>
              <div class="trend-seg" style="width:${(v.expense/maxT*100).toFixed(1)}%;background:var(--red)" title="Expense: ${fmt(v.expense)}"></div>
            </div>
          </div>`).join('') +
        `</div>
        <div class="legend">
          <div class="legend-item"><span class="legend-dot" style="background:var(--green)"></span>Income</div>
          <div class="legend-item"><span class="legend-dot" style="background:var(--red)"></span>Expense</div>
        </div>`;
    }

    // Recent
    const tbody = document.getElementById('recentBody');
    if (!recent.records.length) {
      tbody.innerHTML = `<tr><td colspan="6"><div class="empty-state"><div class="empty-icon">📋</div><p>No records yet</p></div></td></tr>`;
    } else {
      tbody.innerHTML = recent.records.map(r => `
        <tr>
          <td style="color:var(--text2);font-family:var(--mono);font-size:12.5px">${r.date}</td>
          <td style="font-weight:500">${r.category}</td>
          <td><span class="badge badge-${r.type}">${r.type}</span></td>
          <td class="${r.type === 'income' ? 'text-green' : 'text-red'}">${fmt(r.amount)}</td>
          <td class="text-muted" style="font-size:12.5px">${r.notes || '—'}</td>
          <td class="text-muted" style="font-size:12px">${r.created_by_name}</td>
        </tr>`).join('');
    }
  }

  yearSel.addEventListener('change', loadAll);
  document.getElementById('trendPeriod').addEventListener('change', loadAll);
  loadAll();
</script>
</body>
</html>
