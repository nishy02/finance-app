<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FinanceApp — Sign In</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .login-divider {
      display: flex; align-items: center; gap: 12px;
      margin: 22px 0 0;
      color: var(--text3); font-size: 11px; text-transform: uppercase;
      letter-spacing: .06em; font-weight: 600;
    }
    .login-divider::before, .login-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }
    .input-wrap { position: relative; }
    .input-wrap input { padding-left: 38px; }
    .input-icon {
      position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
      color: var(--text3); font-size: 14px; pointer-events: none;
    }
    .btn-primary-spin::after {
      content: '';
      display: inline-block; width: 12px; height: 12px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      margin-left: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
<div class="login-wrap">
  <div class="login-card">

    <div class="login-logo">
      <div class="login-logo-mark">💰</div>
      <span class="login-logo-text">FinanceApp</span>
    </div>

    <h1>Welcome back</h1>
    <p>Sign in to access your finance dashboard</p>

    <form id="loginForm" autocomplete="on">
      <div class="form-group">
        <label>Email address</label>
        <div class="input-wrap">
          <span class="input-icon">✉</span>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email">
        </div>
      </div>
      <div class="form-group">
        <label>Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔑</span>
          <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
        </div>
      </div>
      <button type="submit" class="btn btn-primary" id="loginBtn">Sign in</button>
      <div class="error-msg" id="errorMsg"></div>
    </form>

    <div class="login-divider">Demo accounts</div>

    <div class="demo-accounts" style="margin-top:12px;padding-top:0;border:none">
      <button class="demo-btn" onclick="fillDemo('admin@example.com','admin123')">
        <span>admin@example.com</span>
        <span class="badge badge-admin">admin</span>
      </button>
      <button class="demo-btn" onclick="fillDemo('analyst@example.com','analyst123')">
        <span>analyst@example.com</span>
        <span class="badge badge-analyst">analyst</span>
      </button>
      <button class="demo-btn" onclick="fillDemo('viewer@example.com','viewer123')">
        <span>viewer@example.com</span>
        <span class="badge badge-viewer">viewer</span>
      </button>
    </div>

  </div>
</div>

<script src="app.js"></script>
<script>
  if (auth.token()) {
    location.href = auth.is('analyst') ? 'dashboard.html' : 'records.html';
  }

  function fillDemo(email, password) {
    document.getElementById('email').value = email;
    document.getElementById('password').value = password;
    document.getElementById('email').dispatchEvent(new Event('input'));
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const err = document.getElementById('errorMsg');
    err.textContent = '';
    btn.disabled = true;
    btn.textContent = 'Signing in';
    btn.classList.add('btn-primary-spin');

    try {
      const data = await api('POST', '/auth/login', {
        email:    document.getElementById('email').value,
        password: document.getElementById('password').value,
      });
      auth.save(data.token, data.user);
      location.href = auth.is('analyst') ? 'dashboard.html' : 'records.html';
    } catch (ex) {
      err.textContent = ex?.error || 'Invalid credentials. Please try again.';
      btn.disabled = false;
      btn.textContent = 'Sign in';
      btn.classList.remove('btn-primary-spin');
    }
  });
</script>
</body>
</html>
